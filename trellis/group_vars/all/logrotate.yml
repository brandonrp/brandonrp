# Documentation: https://github.com/nickhammond/ansible-logrotate
logrotate_scripts:
  - name: wordpress-sites
    path: "{{ www_root }}/**/logs/*.log"
    options:
      - weekly
      - maxsize 50M
      - missingok
      - rotate 8
      - compress
      - delaycompress
      - notifempty
      - create 0640 {{ web_user }} {{ web_group }}
      - sharedscripts
    scripts:
      prerotate: |
        if [ -d /etc/logrotate.d/httpd-prerotate ]; then \
              run-parts /etc/logrotate.d/httpd-prerotate; \
            fi \
      postrotate: service nginx reload >/dev/null 2>&1

  # Rotate PHP-FPM logs to prevent unbounded growth
  - name: php-fpm-logs
    path: /var/log/php*-fpm*.log
    options:
      - daily
      - maxsize 100M
      - missingok
      - rotate 7
      - compress
      - delaycompress
      - notifempty
      - create 0640 www-data www-data
      - sharedscripts
    scripts:
      postrotate: |
        /bin/kill -USR1 `cat /run/php/php*-fpm.pid 2>/dev/null` 2>/dev/null || true

  # Rotate Nginx logs to prevent unbounded growth
  - name: nginx-logs
    path: /var/log/nginx/*.log
    options:
      - daily
      - maxsize 100M
      - missingok
      - rotate 7
      - compress
      - delaycompress
      - notifempty
      - create 0640 www-data www-data
      - sharedscripts
    scripts:
      postrotate: |
        /bin/kill -USR1 `cat /run/nginx.pid 2>/dev/null` 2>/dev/null || true
