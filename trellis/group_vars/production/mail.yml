# Production outbound mail (ssmtp → PHP sendmail → wp_mail / Contact Form 7).
# Provider: SendGrid SMTP — https://docs.sendgrid.com/for-developers/sending-email/getting-started-smtp
#
# 1. SendGrid → Settings → API Keys → Create API Key (at least “Mail Send”).
# 2. Set vault_mail_password in group_vars/production/vault.yml to that key (ansible-vault edit).
# 3. Sender Authentication: verify a Single Sender or Domain so mail_admin is allowed.
# 4. Apply: ansible-playbook server.yml -e env=production -u root --tags ssmtp
#
# SMTP username must be literally "apikey"; password is your API key.

mail_smtp_server: smtp.sendgrid.net:587
mail_admin: me@brandonrp.com
mail_hostname: brandonrp.com
mail_user: apikey
mail_password: "{{ vault_mail_password }}"
